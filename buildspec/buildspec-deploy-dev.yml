# buildspec/buildspec-deploy-dev.yml
# DEPLOY STAGE — DEV environment
#
# Steps:
#   1. Verify the Lambda zip is present in the artifact
#   2. Update the Lambda function code
#   3. Wait for the update to propagate
#   4. Invoke the Lambda to perform a smoke-test deposit into the dev S3 bucket
#   5. Confirm the deposited object exists in S3

version: 0.2

env:
  variables:
    # These are also injected by Terraform via the CodeBuild project env vars.
    # Declaring them here keeps the buildspec self-documenting.
    ENVIRONMENT: "dev"
    # LAMBDA_FUNCTION_NAME and TARGET_BUCKET injected by Terraform.

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - ls -l
      - env | sort
      - aws --version

  pre_build:
    commands:
      - echo "=== Deploying to DEV ==="
      - echo "Lambda-> $LAMBDA_FUNCTION_NAME"
      - echo "Bucket-> $TARGET_BUCKET"
      - |
        if [ ! -f lambda-deployment.zip ]; then
          echo "ERROR--lambda-deployment.zip missing from artifact"
          exit 1
        fi
      - echo "Artifact size->" && du -sh lambda-deployment.zip

  build:
    commands:
      # Step 1 — Push updated code to Lambda
      - echo "=== Updating Lambda function code ==="
      - >-
        aws lambda update-function-code
        --function-name "$LAMBDA_FUNCTION_NAME"
        --zip-file fileb://lambda-deployment.zip
        --region "$AWS_DEFAULT_REGION"

      # Step 2 — Wait for the update to finish propagating
      - echo "=== Waiting for update to complete ==="
      - >-
        aws lambda wait function-updated
        --function-name "$LAMBDA_FUNCTION_NAME"
        --region "$AWS_DEFAULT_REGION"

      # Step 3 — Invoke Lambda and capture response
      - echo "=== Smoke-test- invoking Lambda ==="
      - >-
        aws lambda invoke
        --function-name "$LAMBDA_FUNCTION_NAME"
        --payload '{"source":"codepipeline","environment":"dev"}'
        --cli-binary-format raw-in-base64-out
        --region "$AWS_DEFAULT_REGION"
        /tmp/lambda-response.json
      - echo "Lambda response--" && cat /tmp/lambda-response.json

      # Step 4 — Extract the S3 key returned by the Lambda
      - echo "=== Extracting deposited S3 key ==="
      - |
        DEPOSITED_KEY=
        echo "Deposited key-> $DEPOSITED_KEY"

        # Step 5 — Confirm the object is present in S3
        echo "=== Verifying S3 deposit ==="
        aws s3api head-object           --bucket "$TARGET_BUCKET"           --key "$DEPOSITED_KEY"           --region "$AWS_DEFAULT_REGION"           && echo "SUCCESS-> s3://$TARGET_BUCKET/$DEPOSITED_KEY confirmed"           || (echo "ERROR-> Object not found in S3" && exit 1)

  post_build:
    commands:
      - echo "=== DEV deploy complete at Sun Mar  8 02:41:13 UTC 2026 ==="

# Pass artifacts forward so the next stage can consume them
artifacts:
  files:
    - "**/*"
    - buildspec/**/*
  discard-paths: no
